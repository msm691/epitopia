<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Epitopia</title>
  </head>
  <body>
    <div id="crash-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:red; color:white; z-index:999999; padding:20px; font-family:monospace; white-space:pre-wrap;"></div>
    <script>
      window.onerror = function(msg, src, lineno, colno, error) {
        var overlay = document.getElementById('crash-overlay');
        overlay.style.display = 'block';
        overlay.innerText = "CRASH: " + msg + "\n" + (error ? error.stack : "");
      };
      window.addEventListener('unhandledrejection', function(event) {
        var overlay = document.getElementById('crash-overlay');
        overlay.style.display = 'block';
        overlay.innerText = "UNHANDLED PROMISE: " + event.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
</html>
